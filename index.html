// == ATOM COMPONENTS ==
function Toast(props){
if(!props.msg)return null;
var bg=props.type===“error”?RED:props.type===“warning”?ORG:GRN;
var icon=props.type===“error”?“❌”:props.type===“warning”?“⚠️”:“✅”;
return React.createElement(“div”,{className:“no-print”,style:{position:“fixed”,bottom:88,left:“50%”,transform:“translateX(-50%)”,background:bg,color:”#fff”,borderRadius:22,padding:“12px 22px”,fontSize:14,fontWeight:700,fontFamily:SS,boxShadow:“0 4px 24px rgba(0,0,0,0.22)”,zIndex:9999,whiteSpace:“nowrap”,animation:“toastIn 0.22s ease both”}},icon+” “+props.msg);
}
function Crd(props){
var s=Object.assign({background:CRD,borderRadius:16,boxShadow:SHD,overflow:“hidden”},props.style||{});
return <div style={s} className={props.className||””}>{props.children}</div>;
}
function SecT(props){return <div style={{fontSize:11,fontWeight:700,color:MUT,textTransform:“uppercase”,letterSpacing:“0.08em”,marginBottom:6,paddingLeft:2}}>{props.children}</div>;}
function Badge(props){var col=props.color||MUT,bg=props.bg||(col+“18”);return <span style={{display:“inline-flex”,alignItems:“center”,gap:3,background:bg,color:col,borderRadius:20,padding:“3px 10px”,fontSize:11,fontWeight:700,whiteSpace:“nowrap”}}>{props.children}</span>;}
function Avatar(props){
var initials=(props.name||”?”).split(” “).map(function(w){return w[0]||””;}).slice(0,2).join(””).toUpperCase();
var cols=[BLU,GRN,PUR,ORG,TEA,PNK];
var col=cols[(props.name||“X”).charCodeAt(0)%cols.length];
var sz=props.size||36;
return <div style={{width:sz,height:sz,borderRadius:“50%”,background:col+“22”,border:“1.5px solid “+col+“40”,display:“flex”,alignItems:“center”,justifyContent:“center”,color:col,fontSize:sz*0.36,fontWeight:800,flexShrink:0,fontFamily:MN}}>{initials}</div>;
}
function PrimaryBtn(props){
var bg=props.disabled?”#C7C7CC”:(“linear-gradient(135deg,”+(props.col||BLU)+”,”+(props.col2||(props.col||”#0055CC”))+”)”);
return <button onClick={props.onClick} disabled={props.disabled} className={props.className||“no-print”} style={{width:“100%”,padding:“15px”,borderRadius:14,border:“none”,background:bg,color:”#fff”,fontSize:16,fontWeight:800,cursor:props.disabled?“not-allowed”:“pointer”,fontFamily:SS,marginTop:8}}>{props.children}</button>;
}
function SecBtn(props){
return <button onClick={props.onClick} className={props.className||“no-print”} style={{width:“100%”,padding:“13px”,borderRadius:14,border:“1.5px solid “+(props.col||BDR),background:“transparent”,color:props.col||MUT,fontSize:14,fontWeight:700,cursor:“pointer”,fontFamily:SS,marginTop:6}}>{props.children}</button>;
}
function FRow(props){return <div style={{marginBottom:13}}><div style={{fontSize:11,fontWeight:700,color:MUT,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:5}}>{props.label}</div>{props.children}</div>;}
function FInp(props){
var border=props.error?“1.5px solid “+RED:“1.5px solid “+BDR;
return <input value={props.value} onChange={function(e){props.onChange(e.target.value);}} placeholder={props.placeholder||””} type={props.type||“text”} style={{width:“100%”,background:BG,border:border,borderRadius:12,padding:“11px 14px”,color:TXT,fontSize:15,outline:“none”,fontFamily:SS}}/>;

function MiniBar(props){
var data=props.data||[];

<div style={{display:“flex”,alignItems:“flex-end”,gap:4,height:props.h||52}}>
{data.map(function(d,i){

return(
<div key={i} style={{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,gap:3}}>
<div style={{width:“100%”,height:(props.h||52)-16,display:“flex”,alignItems:“flex-end”}}>

function AuthScreen(props){
var [mode,setMode]=useState(“login”);
var [loginEmail,setLoginEmail]=useState(””);
var [loginPw,setLoginPw]=useState(””);
var [loginErr,setLoginErr]=useState(””);
var [shake,setShake]=useState(false);
var [regName,setRegName]=useState(””);
var [regEmail,setRegEmail]=useState(””);
var [regPw,setRegPw]=useState(””);
var [regPw2,setRegPw2]=useState(””);
var [regRole,setRegRole]=useState(“agent”);
var [regCompany,setRegCompany]=useState(””);
var [regPhone,setRegPhone]=useState(””);
var [regErr,setRegErr]=useState(””);

function doLogin(){
setLoginErr(””);
var users=lsGet(“nlcrm_users”)||[];
var u=users.find(function(x){return x.email.toLowerCase()===loginEmail.toLowerCase()&&x.password===hashPw(loginPw);});
if(!u){
setLoginErr(“Invalid email or password”);
setShake(true);
setTimeout(function(){setShake(false);},400);
return;
}
if(!u.active){setLoginErr(“Account is inactive. Contact admin.”);return;}
lsSet(“nlcrm_session”,{userId:u.id,name:u.name,role:u.role,company:u.company,email:u.email,avatar:u.avatar||u.name.slice(0,2).toUpperCase()});
props.onLogin(u);
}

function doRegister(){
setRegErr(””);
if(!regName.trim()||!regEmail.trim()||!regPw){setRegErr(“All fields are required”);return;}
if(!regEmail.includes(”@”)){setRegErr(“Enter a valid email”);return;}
if(regPw.length<6){setRegErr(“Password must be at least 6 characters”);return;}
if(regPw!==regPw2){setRegErr(“Passwords do not match”);return;}
var users=lsGet(“nlcrm_users”)||[];
if(users.find(function(x){return x.email.toLowerCase()===regEmail.toLowerCase();})){setRegErr(“Email already registered”);return;}
var nu={id:mkId(“USR”),name:regName.trim(),email:regEmail.toLowerCase().trim(),password:hashPw(regPw),role:regRole,company:regCompany.trim()||“Global Nortkem Marketing Inc.”,phone:regPhone.trim(),active:regRole===“agent”||regRole===“staff”?true:false,createdAt:todayISO(),avatar:regName.trim().split(” “).map(function(w){return w[0]||””;}).slice(0,2).join(””).toUpperCase()};
if(regRole===“admin”||regRole===“operator”){nu.active=false;nu.pendingApproval=true;}
users.push(nu);
lsSet(“nlcrm_users”,users);
if(nu.pendingApproval){
setMode(“login”);
setRegErr(””);
setLoginErr(“Account created! Pending admin approval.”);
} else {
lsSet(“nlcrm_session”,{userId:nu.id,name:nu.name,role:nu.role,company:nu.company,email:nu.email,avatar:nu.avatar});
props.onLogin(nu);
}
}

return(

setErr(“Incorrect credentials”);
setShake(true);
setTimeout(function(){setShake(false);},400);

}
if(u.role!==“admin”&&u.role!==“operator”){

props.onSuccess(u);
setPassword(””);
setErr(””);
}

});
var [unlockedFields,setUnlockedFields]=useState({});
var [authPending,setAuthPending]=useState(null); // {field, label}

function requestUnlock(field,label){
setAuthPending({field:field,label:label});
}

function onAuthSuccess(authorizer){
if(authPending){
setUnlockedFields(function(prev){return Object.assign({},prev,{[authPending.field]:true});});
props.showToast(“Unlocked by “+authorizer.name,“success”);
}
setAuthPending(null);
}

function setB(key){return function(v){setBasic(function(prev){return Object.assign({},prev,{[key]:v});});};}
function setS(key){return function(v){setSensitive(function(prev){return Object.assign({},prev,{[key]:v});});};}

function doSave(){
if(!basic.name.trim()){props.showToast(“Client name required”,“error”);return;}
var updated=Object.assign({},c,basic,sensitive,{outstandingBalance:parseFloat(sensitive.outstandingBalance)||0,totalSpent:parseFloat(sensitive.totalSpent)||0,creditLimit:parseFloat(sensitive.creditLimit)||0});
props.onSave(updated);
}

function Inventory(props){
var [showRestock,setShowRestock]=useState(false);

var qty=parseFloat(restockQty);
if(!qty||qty<=0){props.showToast(“Enter valid quantity”,“error”);return;}
props.setInventory(function(prev){return prev.map(function(item){return item.id===restockItem.id?Object.assign({},item,{stock:Math.round((item.stock+qty)*100)/100,lastRestocked:todayISO()}):item;});});
setShowRestock(false);setRestockItem(null);setRestockQty(””);
props.showToast(“Stock updated”);

<div style={{marginTop:5}}><Badge color={ROLE_COLORS[user.role]||BLU} bg={(ROLE_COLORS[user.role]||BLU)+“18”}>{ROLES[user.role]||user.role}</Badge></div>
</div>
<button onClick={function(){setShowEditProfile(true);}} style={{background:BDL,border:“1px solid “+BLU+“30”,color:BLU,borderRadius:9,padding:“7px 13px”,fontSize:12,fontWeight:700,cursor:“pointer”,fontFamily:SS}}>Edit</button>
</div>
<SecT>Account Info</SecT>
<Crd style={{marginBottom:18}}>
{[[“Email”,user.email],[“Role”,ROLES[user.role]||user.role],[“Company”,user.company||”—”],[“Phone”,user.phone||”—”],[“Joined”,fmtDate(user.createdAt)]].map(function(r,i,arr){
return <div key={r[0]} style={{display:“flex”,justifyContent:“space-between”,padding:“10px 14px”,borderBottom:i<arr.length-1?“1px solid “+BDR:“none”}}><span style={{color:MUT,fontSize:12}}>{r[0]}</span><span style={{color:TXT,fontSize:13,fontWeight:600}}>{r[1]}</span></div>;
})}
</Crd>
<SecT>About</SecT>
<Crd style={{marginBottom:18}}>
{[[“App”,“NortLaundry CRM v2.0”],[“Company”,“Global Nortkem Marketing Inc.”],[“Location”,“Angeles City, Pampanga”],[“Contact”,“contact@nortkem.ph”]].map(function(r,i,arr){
return <div key={r[0]} style={{display:“flex”,justifyContent:“space-between”,padding:“10px 14px”,borderBottom:i<arr.length-1?“1px solid “+BDR:“none”}}><span style={{color:MUT,fontSize:12}}>{r[0]}</span><span style={{color:TXT,fontSize:13,fontWeight:600}}>{r[1]}</span></div>;
})}
</Crd>
<button onClick={logout} style={{width:“100%”,padding:“15px”,borderRadius:14,border:“1.5px solid “+RED,background:RLT,color:RED,fontSize:16,fontWeight:800,cursor:“pointer”,fontFamily:SS}}>Sign Out</button>
</div>
<ModalSheet open={showEditProfile} title="Edit Profile" onClose={function(){setShowEditProfile(false);}}>
<FRow label="Full Name"><FInp value={name} onChange={setName} placeholder="Your name"/></FRow>
<FRow label="Company"><FInp value={company} onChange={setCompany} placeholder="Company"/></FRow>
<FRow label="Phone"><FInp value={phone} onChange={setPhone} placeholder="+63..."/></FRow>
<PrimaryBtn onClick={saveProfile}>Save Changes</PrimaryBtn>
</ModalSheet>
</div>
);
}
// == REPORTS MODULE ==
function Reports(props){
var orders=props.orders;
var clients=props.clients;
var invoices=props.invoices;
var inventory=props.inventory;
var staff=props.staff;

var totalRev=invoices.filter(function(i){return i.status===“paid”;}).reduce(function(s,i){return s+i.totalAmount;},0);
var totalRec=invoices.filter(function(i){return i.status===“unpaid”;}).reduce(function(s,i){return s+i.totalAmount;},0);
var deliveredOrders=orders.filter(function(o){return o.status===“delivered”;}).length;
var completionRate=orders.length>0?Math.round((deliveredOrders/orders.length)*100):0;

var serviceBreakdown={};
orders.forEach(function(o){serviceBreakdown[o.service]=(serviceBreakdown[o.service]||0)+1;});
var serviceArr=Object.keys(serviceBreakdown).map(function(k){return{name:k,count:serviceBreakdown[k]};}).sort(function(a,b){return b.count-a.count;});
var maxSvc=serviceArr.length?serviceArr[0].count:1;

var clientRevenue={};
invoices.filter(function(i){return i.status===“paid”;}).forEach(function(i){clientRevenue[i.clientName]=(clientRevenue[i.clientName]||0)+i.totalAmount;});
var topClients=Object.keys(clientRevenue).map(function(k){return{name:k,rev:clientRevenue[k]};}).sort(function(a,b){return b.rev-a.rev;}).slice(0,5);
var maxRev=topClients.length?topClients[0].rev:1;

return(
<div>
<div className=“no-print” style={{background:“rgba(242,242,247,0.96)”,backdropFilter:“blur(20px)”,borderBottom:“1px solid “+BDR,padding:“12px 14px”,position:“sticky”,top:0,zIndex:100}}>
<div style={{fontSize:20,fontWeight:900,color:TXT}}>Reports & Analytics</div>
<div style={{fontSize:12,color:MUT}}>All-time summary</div>
</div>
<div className=“no-print” style={{padding:“12px”,paddingBottom:100}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10,marginBottom:10}}>
<div style={{background:GLT,borderRadius:13,padding:“13px”}}>
<div style={{fontSize:10,fontWeight:700,color:GRN,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:4}}>Collected</div>
<div style={{fontSize:18,fontWeight:900,color:GRN,fontFamily:MN}}>{fmtPeso(totalRev)}</div>
</div>
<div style={{background:OLT,borderRadius:13,padding:“13px”}}>
<div style={{fontSize:10,fontWeight:700,color:ORG,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:4}}>Receivable</div>
<div style={{fontSize:18,fontWeight:900,color:ORG,fontFamily:MN}}>{fmtPeso(totalRec)}</div>
</div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:10,marginBottom:18}}>
<div style={{background:CRD,borderRadius:13,padding:“11px”,textAlign:“center”,boxShadow:SHD}}><div style={{fontSize:18,fontWeight:900,color:TXT,fontFamily:MN}}>{orders.length}</div><div style={{fontSize:10,color:MUT}}>Orders</div></div>
<div style={{background:CRD,borderRadius:13,padding:“11px”,textAlign:“center”,boxShadow:SHD}}><div style={{fontSize:18,fontWeight:900,color:GRN,fontFamily:MN}}>{completionRate}%</div><div style={{fontSize:10,color:MUT}}>Completion</div></div>
<div style={{background:CRD,borderRadius:13,padding:“11px”,textAlign:“center”,boxShadow:SHD}}><div style={{fontSize:18,fontWeight:900,color:BLU,fontFamily:MN}}>{clients.length}</div><div style={{fontSize:10,color:MUT}}>Clients</div></div>
</div>
<div style={{marginBottom:18}}>
<SecT>Top Clients by Revenue</SecT>
<Crd>
{topClients.length===0&&<div style={{padding:“18px”,textAlign:“center”,color:MUT,fontSize:13}}>No paid invoices yet</div>}
{topClients.map(function(c,i){
var pct=(c.rev/maxRev)*100;
return(
<div key={c.name} style={{padding:“11px 14px”,borderBottom:i<topClients.length-1?“1px solid “+BDR:“none”}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:5}}>
<div style={{display:“flex”,gap:7,alignItems:“center”}}>
<span style={{color:MUT,fontSize:10,fontFamily:MN,minWidth:14}}>{i+1}.</span>
<span style={{fontSize:13,fontWeight:700,color:TXT}}>{c.name}</span>
</div>
<span style={{fontSize:12,fontWeight:700,color:BLU,fontFamily:MN}}>{fmtPeso(c.rev)}</span>
</div>
<div style={{background:BDR,borderRadius:4,height:5}}><div style={{width:pct+”%”,height:“100%”,background:BLU,borderRadius:4}}/></div>
</div>
);
})}
</Crd>
</div>
<div style={{marginBottom:18}}>
<SecT>Services Breakdown</SecT>
<Crd>
{serviceArr.map(function(s,i){
var pct=(s.count/maxSvc)*100;
return(
<div key={s.name} style={{padding:“11px 14px”,borderBottom:i<serviceArr.length-1?“1px solid “+BDR:“none”}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:5}}>
<span style={{fontSize:13,color:TXT,fontWeight:600}}>{s.name}</span>
<span style={{fontSize:12,fontWeight:700,color:PUR,fontFamily:MN}}>{s.count} orders</span>
</div>
<div style={{background:BDR,borderRadius:4,height:5}}><div style={{width:pct+”%”,height:“100%”,background:PUR,borderRadius:4}}/></div>
</div>
);
})}
</Crd>
</div>
<div>
<SecT>Order Status Distribution</SecT>
<Crd style={{padding:“14px”}}>
{Object.keys(ORDER_STATUS).map(function(k){
var st=ORDER_STATUS[k];
var cnt=orders.filter(function(o){return o.status===k;}).length;
var pct=orders.length>0?Math.round((cnt/orders.length)*100):0;
return(
<div key={k} style={{display:“flex”,alignItems:“center”,gap:9,marginBottom:9}}>
<span style={{fontSize:15,width:20}}>{st.emoji}</span>
<span style={{fontSize:12,color:TXT,minWidth:86}}>{st.label}</span>
<div style={{flex:1,background:BDR,borderRadius:4,height:7}}><div style={{width:pct+”%”,height:“100%”,background:st.color,borderRadius:4}}/></div>
<span style={{fontSize:11,fontWeight:700,color:st.color,fontFamily:MN,minWidth:22}}>{cnt}</span>
</div>
);
})}
</Crd>
</div>
</div>
</div>
);
}
// == MAIN APP ==
function NortLaundryCRM(){
var [currentUser,setCurrentUser]=useState(null);
var [tab,setTab]=useState(“dashboard”);
var [toastMsg,setToastMsg]=useState(””);
var [toastType,setToastType]=useState(“success”);
var [tick,setTick]=useState(0);
var [orders,setOrdersState]=useState([]);
var [clients,setClientsState]=useState([]);
var [inventory,setInventoryState]=useState([]);
var [staff,setStaffState]=useState([]);
var [deliveries,setDeliveriesState]=useState([]);
var [invoices,setInvoicesState]=useState([]);

function forceRefresh(){setTick(function(t){return t+1;});}

// Persist to localStorage whenever state changes
function setOrders(fn){setOrdersState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_orders”,next);return next;});}
function setClients(fn){setClientsState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_clients”,next);return next;});}
function setInventory(fn){setInventoryState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_inventory”,next);return next;});}
function setStaff(fn){setStaffState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_staff”,next);return next;});}
function setDeliveries(fn){setDeliveriesState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_deliveries”,next);return next;});}
function setInvoices(fn){setInvoicesState(function(prev){var next=typeof fn===“function”?fn(prev):fn;lsSet(“nlcrm_invoices”,next);return next;});}

useEffect(function(){
initAppData();
var sess=lsGet(“nlcrm_session”);
if(sess){
var users=lsGet(“nlcrm_users”)||[];
var u=users.find(function(x){return x.id===sess.userId;});
if(u&&u.active){setCurrentUser(u);}
}
setOrdersState(lsGet(“nlcrm_orders”)||[]);
setClientsState(lsGet(“nlcrm_clients”)||[]);
setInventoryState(lsGet(“nlcrm_inventory”)||[]);
setStaffState(lsGet(“nlcrm_staff”)||[]);
setDeliveriesState(lsGet(“nlcrm_deliveries”)||[]);
setInvoicesState(lsGet(“nlcrm_invoices”)||[]);
},[tick]);

function showToast(msg,type){
setToastMsg(msg);
setToastType(type||“success”);
setTimeout(function(){setToastMsg(””);},3000);
}

function handleLogin(user){
setCurrentUser(user);
setOrdersState(lsGet(“nlcrm_orders”)||[]);
setClientsState(lsGet(“nlcrm_clients”)||[]);
setInventoryState(lsGet(“nlcrm_inventory”)||[]);
setStaffState(lsGet(“nlcrm_staff”)||[]);
setDeliveriesState(lsGet(“nlcrm_deliveries”)||[]);
setInvoicesState(lsGet(“nlcrm_invoices”)||[]);
}

function handleLogout(){
setCurrentUser(null);
setTab(“dashboard”);
}

if(!currentUser){
return <AuthScreen onLogin={handleLogin}/>;
}

var isAdmin=currentUser.role===“admin”;
var TABS=[
{id:“dashboard”,icon:“⌂”,label:“Home”},
{id:“orders”,icon:“📦”,label:“Orders”},
{id:“clients”,icon:“👥”,label:“Clients”},
{id:“billing”,icon:“🧾”,label:“Billing”},
{id:“delivery”,icon:“🚚”,label:“Delivery”},
{id:“inventory”,icon:“🧪”,label:“Stock”},
{id:“reports”,icon:“📊”,label:“Reports”},
{id:“settings”,icon:“⚙”,label:“Settings”},
];
if(isAdmin){TABS.splice(7,0,{id:“users”,icon:“👤”,label:“Users”});}

var urgentCount=orders.filter(function(o){return o.priority===“urgent”&&o.status!==“delivered”&&o.status!==“cancelled”;}).length;
var activeOrderCount=orders.filter(function(o){return o.status!==“delivered”&&o.status!==“cancelled”;}).length;
var unpaidBadge=invoices.filter(function(i){return i.status===“unpaid”;}).length;
var lowStockBadge=inventory.filter(function(i){return i.stock<=i.minStock;}).length;
var pendingUsersBadge=(lsGet(“nlcrm_users”)||[]).filter(function(u){return u.pendingApproval;}).length;

var sharedProps={orders:orders,setOrders:setOrders,clients:clients,setClients:setClients,inventory:inventory,setInventory:setInventory,staff:staff,setStaff:setStaff,deliveries:deliveries,setDeliveries:setDeliveries,invoices:invoices,setInvoices:setInvoices,setTab:setTab,showToast:showToast,currentUser:currentUser,forceRefresh:forceRefresh};

function renderTab(){
if(tab===“dashboard”)return React.createElement(Dashboard,sharedProps);
if(tab===“orders”)return React.createElement(Orders,sharedProps);
if(tab===“clients”)return React.createElement(Clients,sharedProps);
if(tab===“billing”)return React.createElement(Billing,sharedProps);
if(tab===“delivery”)return React.createElement(Delivery,sharedProps);
if(tab===“inventory”)return React.createElement(Inventory,sharedProps);
if(tab===“reports”)return React.createElement(Reports,sharedProps);
if(tab===“users”)return React.createElement(Users,sharedProps);
if(tab===“settings”)return React.createElement(Settings,Object.assign({},sharedProps,{onLogout:handleLogout}));
return null;
}

function getBadge(tabId){
if(tabId===“orders”)return urgentCount>0?urgentCount:null;
if(tabId===“billing”)return unpaidBadge>0?unpaidBadge:null;
if(tabId===“inventory”)return lowStockBadge>0?lowStockBadge:null;
if(tabId===“users”)return pendingUsersBadge>0?pendingUsersBadge:null;
return null;
}

return(
<div style={{maxWidth:540,margin:“0 auto”,minHeight:“100vh”,background:BG,position:“relative”}}>
<style>{STYLES}</style>
<div className=“no-print” style={{background:“rgba(255,255,255,0.96)”,backdropFilter:“blur(20px)”,WebkitBackdropFilter:“blur(20px)”,borderBottom:“1px solid “+BDR,padding:“10px 14px”,position:“sticky”,top:0,zIndex:200}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”}}>
<div style={{display:“flex”,alignItems:“center”,gap:9}}>
<NLogo size={30}/>
<div>
<div style={{fontSize:14,fontWeight:900,color:TXT,letterSpacing:”-0.02em”,lineHeight:1}}>NortLaundry CRM</div>
<div style={{fontSize:8,color:MUT,textTransform:“uppercase”,letterSpacing:“0.06em”}}>Global Nortkem Marketing Inc.</div>
</div>
</div>
<div style={{display:“flex”,gap:7,alignItems:“center”}}>
{urgentCount>0&&(
<button onClick={function(){setTab(“orders”);}} style={{background:RLT,border:“1px solid “+RED+“30”,color:RED,borderRadius:20,padding:“3px 9px”,fontSize:10,fontWeight:700,cursor:“pointer”,fontFamily:SS}}>🔥 {urgentCount}</button>
)}
<div style={{background:BDL,borderRadius:20,padding:“3px 9px”,fontSize:10,fontWeight:700,color:BLU}}>{activeOrderCount} active</div>
<Avatar name={currentUser.name} size={28}/>
</div>
</div>
</div>
<div style={{paddingBottom:80}}>
{renderTab()}
</div>
<div className=“no-print” style={{position:“fixed”,bottom:0,left:“50%”,transform:“translateX(-50%)”,width:“100%”,maxWidth:540,background:“rgba(255,255,255,0.97)”,backdropFilter:“blur(24px)”,WebkitBackdropFilter:“blur(24px)”,borderTop:“1px solid “+BDR,zIndex:200,paddingBottom:“env(safe-area-inset-bottom,0px)”}}>
<div style={{display:“flex”,padding:“4px 2px 5px”,overflowX:“auto”}}>
{TABS.map(function(t){
var active=tab===t.id;
var badge=getBadge(t.id);
return(
<button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:“1 0 auto”,minWidth:0,padding:“6px 1px 3px”,background:“transparent”,border:“none”,cursor:“pointer”,position:“relative”,fontFamily:SS}}>
<div style={{textAlign:“center”}}>
<div style={{fontSize:active?20:18,lineHeight:1}}>{t.icon}</div>
<div style={{fontSize:8,fontWeight:active?800:500,color:active?BLU:MUT,marginTop:2,letterSpacing:“0.01em”,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”}}>{t.label}</div>
{active?<div style={{position:“absolute”,bottom:-1,left:“50%”,transform:“translateX(-50%)”,width:20,height:3,background:BLU,borderRadius:3}}/>:null}
</div>
{badge?<div style={{position:“absolute”,top:3,right:“12%”,background:RED,color:”#fff”,borderRadius:10,minWidth:15,height:15,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:8,fontWeight:900,padding:“0 3px”,border:“1.5px solid #fff”}}>{badge>9?“9+”:badge}</div>:null}
</button>
);
})}
</div>
</div>
<Toast msg={toastMsg} type={toastType}/>
</div>
);
}

const container=document.getElementById(“root”);
const root=ReactDOM.createRoot(container);
root.render(React.createElement(NortLaundryCRM));
</script>

</body>
</html>
