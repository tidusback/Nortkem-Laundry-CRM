.sheet-back{position:absolute;inset:0;background:rgba(0,0,0,0.45)}

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

),

btn({onClick:function(){toggleStatus(s.id);},style:{background:BG,border:“1px solid “+BDR,borderRadius:8,padding:“3px 9px”,fontSize:10,fontWeight:700,cursor:“pointer”,color:MUT,fontFamily:SS}},isActive?“Set Off”:“Set Active”)
)
);
})
)
),
C(ModalSheet,{open:showAdd,title:“Add Staff”,onClose:function(){setShowAdd(false);}},
C(FRow,{label:“Full Name *”},C(FInp,{value:form.name,onChange:setF(“name”),placeholder:“Staff name”})),
C(FRow,{label:“Role”},C(FSel,{value:form.role,onChange:setF(“role”)},[“Laundry Operator”,“Quality Inspector”,“Driver”,“Presser”,“Sorter”,“Admin”].map(function(r){return C(“option”,{key:r,value:r},r);}))),
C(FRow,{label:“Phone”},C(FInp,{value:form.phone,onChange:setF(“phone”),placeholder:”+63…”})),
C(FRow,{label:“Shift”},C(FSel,{value:form.shift,onChange:setF(“shift”)},[“Morning”,“Afternoon”,“Night”].map(function(s){return C(“option”,{key:s,value:s},s);}))),
C(PrimaryBtn,{onClick:addStaff,col:PUR,col2:”#8822CC”},“Add Staff Member”)
)
);
}

// === REPORTS ===
function Reports(p){
var orders=p.orders,invs=p.invoices,clients=p.clients;
var totalRev=invs.filter(function(i){return i.status===“paid”;}).reduce(function(s,i){return s+i.totalAmount;},0);
var outstanding=invs.filter(function(i){return i.status===“unpaid”;}).reduce(function(s,i){return s+i.totalAmount;},0);
var svcCounts={};orders.forEach(function(o){svcCounts[o.service]=(svcCounts[o.service]||0)+1;});
var topSvcs=Object.keys(svcCounts).sort(function(a,b){return svcCounts[b]-svcCounts[a];}).slice(0,5);
var cliRev={};orders.forEach(function(o){cliRev[o.clientName]=(cliRev[o.clientName]||0)+o.amount;});
var topClis=Object.keys(cliRev).sort(function(a,b){return cliRev[b]-cliRev[a];}).slice(0,5);
var maxCliRev=Math.max.apply(null,topClis.map(function(k){return cliRev[k];})||[1]);
var maxSvc=Math.max.apply(null,topSvcs.map(function(k){return svcCounts[k];})||[1]);
return div({className:“fu”,style:{padding:“16px”,paddingBottom:110}},
div({style:{fontSize:22,fontWeight:700,color:TXT,marginBottom:14}},“Reports”),
div({style:{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10,marginBottom:16}},
C(StatCard,{label:“Total Revenue”,value:fmtPeso(totalRev),color:GRN,big:true}),
C(StatCard,{label:“Outstanding”,value:fmtPeso(outstanding),color:ORG,big:true})
),
div({style:{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:8,marginBottom:20}},
C(StatCard,{label:“Total Orders”,value:orders.length,color:BLU}),
C(StatCard,{label:“Total Clients”,value:clients.length,color:PUR}),
C(StatCard,{label:“Avg Order”,value:fmtPeso(orders.length?orders.reduce(function(s,o){return s+o.amount;},0)/orders.length:0),color:TEA})
),
div({style:{marginBottom:20}},
C(SecT,null,“Top Clients by Revenue”),
C(Crd,null,
topClis.map(function(name,i){
var pct=Math.round((cliRev[name]/maxCliRev)*100);
return div({key:name,style:{padding:“10px 14px”,borderBottom:i<topClis.length-1?“1px solid “+BDR:“none”}},
div({style:{display:“flex”,justifyContent:“space-between”,marginBottom:5}},
sp({style:{fontSize:12,fontWeight:700,color:TXT}},name),
sp({style:{fontSize:12,fontWeight:800,color:GRN,fontFamily:MN}},fmtPeso(cliRev[name]))
),
div({style:{height:5,background:BDR,borderRadius:3,overflow:“hidden”}},
div({style:{height:“100%”,width:pct+”%”,background:GRN,borderRadius:3}})
)
);
})
)
),
div({style:{marginBottom:20}},
C(SecT,null,“Top Services”),
C(Crd,null,
topSvcs.map(function(name,i){
var pct=Math.round((svcCounts[name]/maxSvc)*100);
return div({key:name,style:{padding:“10px 14px”,borderBottom:i<topSvcs.length-1?“1px solid “+BDR:“none”}},
div({style:{display:“flex”,justifyContent:“space-between”,marginBottom:5}},
sp({style:{fontSize:12,fontWeight:700,color:TXT}},name),
sp({style:{fontSize:11,color:MUT}},svcCounts[name]+” orders”)
),
div({style:{height:5,background:BDR,borderRadius:3,overflow:“hidden”}},
div({style:{height:“100%”,width:pct+”%”,background:BLU,borderRadius:3}})
)
);
})
)
)
);
}

// === USERS TAB (admin only) ===
function UsersTab(p){
if(p.currentUser.role!==“admin”)return div({style:{padding:32,textAlign:“center”,color:MUT,fontSize:14}},“Admin access only.”);
var users=p.users;
var pending=users.filter(function(u){return u.pendingApproval;});
function approve(id){p.setUsers(function(prev){return prev.map(function(u){return u.id===id?Object.assign({},u,{active:true,pendingApproval:false}):u;});});p.showToast(“Account approved”);}
function toggleActive(id){p.setUsers(function(prev){return prev.map(function(u){return u.id===id?Object.assign({},u,{active:!u.active}):u;});});p.showToast(“Account updated”);}
return div({className:“fu”,style:{padding:“16px”,paddingBottom:110}},
div({style:{fontSize:28,fontWeight:700,color:TXT,marginBottom:18,letterSpacing:”-0.04em”}},“Users”),
pending.length>0?div({style:{marginBottom:16}},
C(SecT,null,“Pending Approval (”+pending.length+”)”),
div({style:{display:“flex”,flexDirection:“column”,gap:8}},
pending.map(function(u){
return div({key:u.id,style:{background:OLT,border:“1.5px solid “+ORG+“40”,borderRadius:13,padding:“12px 13px”,display:“flex”,gap:10,alignItems:“center”}},
C(Avatar,{name:u.name,size:38}),
div({style:{flex:1}},
div({style:{fontSize:13,fontWeight:800,color:TXT}},u.name),
div({style:{fontSize:11,color:MUT}},u.email+” - “+ROLES[u.role]+” - “+u.company)
),
btn({onClick:function(){approve(u.id);},style:{background:GRN,border:“none”,color:”#fff”,borderRadius:9,padding:“7px 13px”,fontSize:12,fontWeight:700,cursor:“pointer”,fontFamily:SS}},“Approve”)
);
})
)
):null,
C(SecT,null,“All Accounts”),
C(Crd,null,
users.map(function(u,i){
return div({key:u.id,style:{display:“flex”,gap:10,alignItems:“center”,padding:“11px 14px”,borderBottom:i<users.length-1?“1px solid “+BDR:“none”}},
C(Avatar,{name:u.name,size:36}),
div({style:{flex:1,minWidth:0}},
div({style:{fontSize:12,fontWeight:800,color:TXT,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”}},u.name),
div({style:{fontSize:10,color:MUT}},u.email+” - “+u.company)
),
div({style:{display:“flex”,gap:5,alignItems:“center”,flexShrink:0}},
C(Badge,{color:RCOL[u.role]||BLU,bg:(RCOL[u.role]||BLU)+“18”},ROLES[u.role]),
u.id!==p.currentUser.id?btn({onClick:function(){toggleActive(u.id);},style:{background:u.active?RLT:GLT,border:“none”,borderRadius:8,padding:“4px 9px”,fontSize:10,fontWeight:700,cursor:“pointer”,color:u.active?RED:GRN,fontFamily:SS}},u.active?“Deactivate”:“Activate”):null
)
);
})
)
);
}

// === SETTINGS ===
function Settings(p){
var cu=p.currentUser;
var s1=useState(cu.name),name=s1[0],setName=s1[1];
var s2=useState(cu.email),email=s2[0],setEmail=s2[1];
var s3=useState(cu.company||””),company=s3[0],setCompany=s3[1];
function saveProfile(){
var updated=Object.assign({},cu,{name:name,email:email,company:company});

lsSet(“nlcrm_session”,updated);

}
return div({className:“fu”,style:{padding:“16px”,paddingBottom:110}},
div({style:{fontSize:28,fontWeight:700,color:TXT,marginBottom:20,letterSpacing:”-0.04em”}},“Settings”),
div({className:“ios-group”,style:{display:“flex”,gap:14,alignItems:“center”,padding:“18px”,marginBottom:24}},
C(Avatar,{name:cu.name,size:54}),
div(null,
div({style:{fontSize:16,fontWeight:700,color:TXT}},cu.name),
div({style:{fontSize:12,color:MUT,marginTop:3}},cu.email),
C(Badge,{color:RCOL[cu.role]||BLU,bg:(RCOL[cu.role]||BLU)+“18”},ROLES[cu.role])
)
),
C(SecT,null,“Edit Profile”),
C(FRow,{label:“Name”},C(FInp,{value:name,onChange:setName,placeholder:“Your name”})),
C(FRow,{label:“Email”},C(FInp,{value:email,onChange:setEmail,type:“email”,placeholder:“your@email.com”})),
C(FRow,{label:“Company”},C(FInp,{value:company,onChange:setCompany,placeholder:“Company name”})),
C(PrimaryBtn,{onClick:saveProfile},“Save Profile”),
div({style:{height:1,background:BDR,margin:“20px 0”}}),
C(SecT,null,“About”),
C(Crd,null,
[[“App”,“NortLaundry CRM v2.0”],[“Built for”,“Global Nortkem Marketing Inc.”],[“Location”,“Angeles City, Pampanga”],[“Tech”,“React 18 - No Build Step”]].map(function(r,i,arr){
return div({key:r[0],style:{display:“flex”,justifyContent:“space-between”,padding:“10px 14px”,borderBottom:i<arr.length-1?“1px solid “+BDR:“none”}},
sp({style:{color:MUT,fontSize:12}},r[0]),sp({style:{color:TXT,fontSize:12,fontWeight:600}},r[1])
);
})
),
div({style:{marginTop:24}}),
btn({onClick:function(){lsDel(“nlcrm_session”);p.onSignOut();},style:{width:“100%”,padding:“16px”,borderRadius:14,border:“none”,background:RLT,color:RED,fontSize:17,fontWeight:500,cursor:“pointer”,fontFamily:SS,letterSpacing:”-0.01em”}},“Sign Out”)
);
}

// === MAIN APP ===
function NortLaundryCRM(){
var s1=useState(null),currentUser=s1[0],setCurrentUser=s1[1];
var s2=useState(“dashboard”),tab=s2[0],setTab=s2[1];
var s3=useState(lsGet(“nlcrm_clients”)||[]),clients=s3[0],setClients=s3[1];
var s4=useState(lsGet(“nlcrm_orders”)||[]),orders=s4[0],setOrders=s4[1];
var s5=useState(lsGet(“nlcrm_invoices”)||[]),invoices=s5[0],setInvoices=s5[1];
var s6=useState(lsGet(“nlcrm_staff”)||[]),staff=s6[0],setStaff=s6[1];
var s7=useState(lsGet(“nlcrm_inventory”)||[]),inventory=s7[0],setInventory=s7[1];
var s8=useState(lsGet(“nlcrm_users”)||[]),users=s8[0],setUsers=s8[1];
var s9=useState(null),toast=s9[0],setToast=s9[1];
var s10=useState(null),toastTimer=s10[0],setToastTimer=s10[1];

useEffect(function(){
var sess=lsGet(“nlcrm_session”);
if(sess&&sess.userId){
var allUsers=lsGet(“nlcrm_users”)||[];
var u=allUsers.find(function(x){return x.id===sess.userId;});
if(u&&u.active)setCurrentUser(sess);
}
},[]);

useEffect(function(){if(clients.length>0)lsSet(“nlcrm_clients”,clients);},[clients]);
useEffect(function(){if(orders.length>0)lsSet(“nlcrm_orders”,orders);},[orders]);
useEffect(function(){if(invoices.length>0)lsSet(“nlcrm_invoices”,invoices);},[invoices]);
useEffect(function(){if(staff.length>0)lsSet(“nlcrm_staff”,staff);},[staff]);
useEffect(function(){if(inventory.length>0)lsSet(“nlcrm_inventory”,inventory);},[inventory]);
useEffect(function(){if(users.length>0)lsSet(“nlcrm_users”,users);},[users]);

function showToast(msg,type){
if(toastTimer)clearTimeout(toastTimer);
setToast({msg:msg,type:type||“success”});
var t=setTimeout(function(){setToast(null);},3200);
setToastTimer(t);
}

if(!currentUser){
return C(AuthScreen,{onLogin:function(u){
initData();
setClients(lsGet(“nlcrm_clients”)||[]);
setOrders(lsGet(“nlcrm_orders”)||[]);
setInvoices(lsGet(“nlcrm_invoices”)||[]);
setStaff(lsGet(“nlcrm_staff”)||[]);
setInventory(lsGet(“nlcrm_inventory”)||[]);
setUsers(lsGet(“nlcrm_users”)||[]);
setCurrentUser(u);setTab(“dashboard”);
}});
}

var sharedProps={currentUser:currentUser,clients:clients,orders:orders,invoices:invoices,staff:staff,inventory:inventory,users:users,setClients:setClients,setOrders:setOrders,setInvoices:setInvoices,setStaff:setStaff,setInventory:setInventory,setUsers:setUsers,showToast:showToast,setTab:setTab};

var TABS=[
{id:“dashboard”,label:“Home”,icon:“🏠”},
{id:“orders”,label:“Orders”,icon:“📦”},
{id:“clients”,label:“Clients”,icon:“👥”},
{id:“billing”,label:“Billing”,icon:“💰”},
{id:“inventory”,label:“Stock”,icon:“🧴”},
{id:“staff”,label:“Staff”,icon:“👤”},
{id:“reports”,label:“Reports”,icon:“📊”}
];
if(currentUser.role===“admin”)TABS.push({id:“users”,label:“Users”,icon:“🔒”});

var pending=users.filter(function(u){return u.pendingApproval;}).length;

return div({style:{display:“flex”,flexDirection:“column”,height:“100vh”,background:BG,maxWidth:600,margin:“0 auto”,position:“relative”,overflow:“hidden”}},
C(Toast,toast||{}),
div({style:{flex:1,overflowY:“auto”,WebkitOverflowScrolling:“touch”}},
tab===“dashboard”?C(Dashboard,sharedProps):
tab===“orders”?C(Orders,sharedProps):
tab===“clients”?C(Clients,sharedProps):
tab===“billing”?C(Billing,sharedProps):
tab===“inventory”?C(Inventory,sharedProps):
tab===“staff”?C(Staff,sharedProps):
tab===“reports”?C(Reports,sharedProps):
tab===“users”?C(UsersTab,sharedProps):
tab===“settings”?C(Settings,Object.assign({},sharedProps,{setCurrentUser:setCurrentUser,onSignOut:function(){setCurrentUser(null);setTab(“dashboard”);}})):
null
),
div({className:“ios-tab no-print”,style:{display:“flex”,paddingBottom:“env(safe-area-inset-bottom,0px)”,position:“sticky”,bottom:0,zIndex:200}},
TABS.map(function(t){
var active=tab===t.id;
return btn({key:t.id,onClick:function(){setTab(t.id);},style:{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:“8px 4px 5px”,border:“none”,background:“transparent”,cursor:“pointer”,fontFamily:SS,position:“relative”,gap:1,minWidth:0}},
div({style:{fontSize:22,lineHeight:1.2}},t.icon),
div({style:{fontSize:10,color:active?BLU:MUT,fontWeight:active?600:400,letterSpacing:”-0.01em”,marginTop:2}},t.label),
(t.id===“users”&&pending>0)?div({style:{position:“absolute”,top:5,right:“20%”,width:7,height:7,background:RED,borderRadius:“50%”}}):null
);
}).concat([
btn({key:“settings”,onClick:function(){setTab(“settings”);},style:{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:“8px 2px 6px”,border:“none”,background:“transparent”,cursor:“pointer”,fontFamily:SS,gap:2}},
div({style:{fontSize:22,lineHeight:1.2}},“⚙️”),
div({style:{fontSize:10,color:tab===“settings”?BLU:MUT,fontWeight:tab===“settings”?600:400,letterSpacing:”-0.01em”,marginTop:2}})
)
])
)
);
}

// === BOOT ===
initData();
ReactDOM.createRoot(document.getElementById(“root”)).render(C(NortLaundryCRM));
})();
</script>
